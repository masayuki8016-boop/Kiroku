<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服薬記録アプリ (診断モード)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <!-- ★診断用：裏側で起きたエラーを強制的に画面に表示します -->
    <script>
        window.addEventListener('error', function(event) {
            const debugArea = document.getElementById('debug-area');
            if(debugArea) {
                debugArea.classList.remove('hidden');
                debugArea.innerText += '\n【システムエラー】\n' + event.message;
            } else {
                alert("致命的なエラー:\n" + event.message);
            }
        });
        window.addEventListener('unhandledrejection', function(event) {
            const debugArea = document.getElementById('debug-area');
            if(debugArea) {
                debugArea.classList.remove('hidden');
                debugArea.innerText += '\n【通信エラー】\n' + event.reason;
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- エラー表示エリア（通常は隠れています） -->
    <div id="debug-area" class="hidden m-4 p-4 bg-red-100 border border-red-500 text-red-700 font-bold whitespace-pre-wrap rounded break-all text-xs z-50 relative"></div>

    <!-- ログイン画面 -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4 fade-in">
        <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl text-center space-y-6 border border-slate-100">
            <h1 class="text-2xl font-bold text-slate-800">服薬記録アプリ</h1>
            <p class="text-slate-500 text-sm leading-relaxed">
                ボタンを押して無反応の場合は、画面上部に赤いエラーが出ていないか確認してください。
            </p>
            <div class="space-y-3">
                <button id="btn-login-google" class="w-full py-4 bg-white border-2 border-slate-200 rounded-2xl font-bold flex items-center justify-center hover:bg-slate-50 transition-colors shadow-sm" onclick="checkClick()">
                    <!-- 画像が読み込めない場合は「代替テキスト」が表示されます -->
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5 mr-3" alt="[Googleロゴ]">
                    Googleでログイン
                </button>
            </div>
            
            <div class="text-left text-xs text-slate-400 mt-4 border-t pt-4">
                <p class="font-bold text-slate-500">【よくあるブロックの原因】</p>
                <ul class="list-disc pl-4 mt-2 space-y-1">
                    <li>病院・会社・カフェ等の厳しいWi-Fi（Wi-Fiを切って4Gで試してください）</li>
                    <li>広告ブロックアプリ（AdGuard等）</li>
                    <li>iPhoneの「サイト越えトラッキングを防ぐ」機能</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- アプリメイン画面 (省略していますがプログラムとしては存在しています) -->
    <div id="app-screen" class="hidden">
        <!-- 省略 -->
    </div>

    <!-- プログラムが動いているか確認用の仮の処理 -->
    <script>
        function checkClick() {
            // プログラムの読み込みが成功していれば、この関数は上書きされます。
            // これが表示されるなら、Firebaseのプログラムがブロックされて読み込めていません。
            alert("ボタンは押せましたが、Googleの通信プログラムがブロックされているためログインに進めません。\nWi-Fiを切るか、別のブラウザを試してください。");
        }
    </script>

    <!-- Firebaseのプログラム読み込み -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJXEmptC0MztleKnYDRnxkP7_SASyWS88",
            authDomain: "kiroku-f9d08.firebaseapp.com",
            projectId: "kiroku-f9d08",
            storageBucket: "kiroku-f9d08.firebasestorage.app",
            messagingSenderId: "43680535697",
            appId: "1:43680535697:web:e9e0c501a980e86fdc1b30"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // 正常に読み込めたら、ボタンの挙動を本番用に上書きする
        document.getElementById('btn-login-google').onclick = null;
        document.getElementById('btn-login-google').addEventListener('click', () => {
            signInWithPopup(auth, googleProvider).catch(error => {
                const debugArea = document.getElementById('debug-area');
                debugArea.classList.remove('hidden');
                debugArea.innerText = "【ログインエラー】\n" + error.message + "\n\nコード: " + error.code;
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                alert("ログインに成功しました！");
            }
        });
    </script>
</body>
</html>
